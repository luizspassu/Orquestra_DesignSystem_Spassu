    case "completed":  return "Concluída";

    default:           return "Pendente";
  }
};

const calcProgress = (detail) => {
  if (!detail) return 0;
  if (detail.progress.length > 0) {
    const avg = detail.progress.reduce((a, b) => a + b.completion_pct, 0) / detail.progress.length;
    return Math.round(avg);
  }
  const allSprints = detail.phases.flatMap(p => p.sprints);
  if (!allSprints.length) return 0;
  const done = allSprints.filter(s => s.status === "completed").length;
  return Math.round(done / allSprints.length * 100);
};

const calcMilestones = (detail) => {
  const m = detail?.milestones ?? [];
  return {
    total:      m.length,
    completed:  m.filter(x => x.status === "completed").length,
    inProgress: m.filter(x => x.status === "in_progress").length,
    pending:    m.filter(x => x.status === "pending").length,
  };
};

// ─── Highlight (busca no texto) ─────────────────────────────────────────────
const Highlight = ({ text, query }) => {
  if (!query || !text) return <>{text}</>;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const parts = String(text).split(new RegExp(`(${escaped})`, "gi"));
  return <>
    {parts.map((p, i) =>
      p.toLowerCase() === query.toLowerCase()
        ? <mark key={i} style={{ background:"#fef08a", color:"#713f12", borderRadius:4, padding:"0 2px" }}>{p}</mark>
        : p
    )}
  </>;
};

  const ref = useRef(null);
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);
  const selectedLabel = options.find(o => o.value === value)?.label ?? label;
  return (
    <div ref={ref} style={{ position:"relative", width, flexShrink:0 }}>
      <button
        onClick={() => setOpen(v => !v)}
        style={{
          width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between", gap:6,
          padding:"8px 12px", borderRadius:8,
          border: isActive ? "1.5px solid #201547" : "1px solid #d1d5db",
          background: isActive ? "#201547" : "#fff",
          color: isActive ? "#fff" : "#374151",
          fontSize:13, fontWeight:500, cursor:"pointer", overflow:"hidden",
        }}
      >
        <span style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{selectedLabel}</span>
        <span style={{ flexShrink:0 }}><IChevron open={open} /></span>
      </button>
      {open && (
        <div style={{
          position:"absolute", top:"calc(100% + 4px)", left:0, zIndex:200,
          background:"#fff", border:"1px solid #e5e7eb", borderRadius:8,
          boxShadow:"0 10px 20px -5px rgba(32,21,71,.15)", minWidth:190,
          overflow:"hidden", padding:"4px 0",
        }}>
          {options.map(opt => {
            const isSel = value === opt.value;
            return (
              <button key={opt.value}
                onClick={() => { onChange(opt.value); setOpen(false); }}
                style={{
                  width:"100%", textAlign:"left", display:"flex", alignItems:"center", gap:6,
                  padding:"8px 12px", fontSize:13, cursor:"pointer", border:"none",
                  background: isSel ? "rgba(32,21,71,0.05)" : "transparent",
                  color: isSel ? "#201547" : "#374151", fontWeight: isSel ? 500 : 400,
                }}
                onMouseEnter={e => { if (!isSel) e.currentTarget.style.background="#f9fafb"; }}
                onMouseLeave={e => { if (!isSel) e.currentTarget.style.background="transparent"; }}
              >
                {isSel
                  ? <span style={{ color:"#FA4616", flexShrink:0 }}><ICheckMark /></span>
                  : <span style={{ width:13, flexShrink:0 }} />
                }
                {opt.label}
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
};

const Field = ({ label, required, error, icon: Icon, children }) => (
  <div style={fieldWrap}>
    <label style={labelStyle}>
      {label}{required && <span style={{ color:"#FA4616", marginLeft:2 }}>*</span>}

);

// ─── NewProjectPage ───────────────────────────────────────────────────────────
const NewProjectPage = ({ onSave, onOpen, onCancel, editProject = null }) => {
  const [form,    setForm]    = useState(() =>
    editProject
      ? { title: editProject.title || "", description: editProject.description || "",
          company: editProject.company || "", startDate: editProject.startDate || "",
          endDate: editProject.endDate || "", docLink: editProject.docLink || "",
          focalPoint: editProject.focalPoint || "", email: editProject.email || "",
          contractNumber: editProject.contractNumber || editProject.number || "" }
      : INITIAL_FORM
  );
  const [errors,  setErrors]  = useState({});
  const [touched, setTouched] = useState({});
  const [saving,       setSaving]      = useState(false);
  const [savedProject,  setSavedProject] = useState(null);

  const months = calcMonths(form.startDate, form.endDate);

  const change = (k, v) => {
    setForm(f => ({ ...f, [k]: v }));
    setTouched(t => ({ ...t, [k]: true }));
  };

  const validate = () => {
    const e = {};
    if (!form.title.trim())                                                    e.title       = "Campo obrigatório.";
    if (!form.description.trim())                                              e.description = "Campo obrigatório.";
    if (!form.company)                                                         e.company     = "Selecione um cliente.";
    if (!form.startDate)                                                       e.startDate   = "Campo obrigatório.";
    if (!form.endDate)                                                         e.endDate     = "Campo obrigatório.";
    if (form.startDate && form.endDate && new Date(form.endDate) <= new Date(form.startDate))
                                                                               e.endDate     = "Deve ser posterior à data de início.";
    if (!form.docLink.trim())                                                  e.docLink     = "Campo obrigatório.";
    else if (!isURL(form.docLink))                                             e.docLink     = "URL inválida (ex: https://…).";
    if (form.email && !isEmail(form.email))                                    e.email       = "E-mail inválido.";
    return e;
  };

  useEffect(() => {
    const e = validate();
    setErrors(Object.fromEntries(Object.entries(e).filter(([k]) => touched[k])));
  }, [form, touched]);

  const submit = async () => {
    setTouched(Object.fromEntries(Object.keys(INITIAL_FORM).map(k => [k, true])));
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    setSaving(true);
    await new Promise(r => setTimeout(r, 350));
    const newProject = editProject
      ? { ...editProject, ...form, title: form.title.trim(),
          description: form.description.trim(), durationMonths: months }
      : { id: String(Date.now()), number: genICJ(), ...form,
          title: form.title.trim(), description: form.description.trim(),
          durationMonths: months, status: "Planejado", progress: 0 };
    setSaving(false);
    setSavedProject(newProject);
  };

  const inpStyle = (err) => ({
    width:"100%", boxSizing:"border-box", padding:"10px 12px 10px 36px", fontSize:13,
    border: err ? "1px solid #f87171" : "1px solid #d1d5db", borderRadius:8, outline:"none",
    background: err ? "#fef2f2" : "#fff", color:"#1f2937", fontFamily:"inherit",
  });
  const card    = { background:"#fff", borderRadius:12, boxShadow:"0 4px 6px -1px rgba(32,21,71,.1)", padding:32, display:"flex", flexDirection:"column", gap:20 };
  const section = { fontSize:14, fontWeight:600, color:"#201547", borderBottom:"1px solid #f3f4f6", paddingBottom:12, margin:0 };
  const grid2   = { display:"grid", gridTemplateColumns:"1fr 1fr", gap:20 };
  const grid3   = { display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:20 };

  return (
    <>
    <div style={{ minHeight:"100vh", background:"#f9fafb", fontFamily:"Poppins,system-ui,sans-serif" }}>
      <AppHeader />

      {/* Sub-header + breadcrumb */}
      <div style={{ background:"#fff", borderBottom:"1px solid #e5e7eb", height:56, display:"flex", alignItems:"center", padding:"0 32px", gap:8 }}>
        <button onClick={onCancel}
          style={{ background:"none", border:"none", fontSize:13, color:"#6b7280", cursor:"pointer", padding:0 }}
          onMouseEnter={e => e.currentTarget.style.color="#201547"}
          onMouseLeave={e => e.currentTarget.style.color="#6b7280"}
        >Visão geral</button>
        <span style={{ color:"#d1d5db" }}><IChevR /></span>
        <span style={{ fontSize:13, fontWeight:500, color:"#201547" }}>{editProject ? "Editar Projeto" : "Cadastrar Projeto"}</span>
      </div>

      <main style={{ padding:"40px 16px 80px" }}>
        <div style={{ maxWidth:768, margin:"0 auto", display:"flex", flexDirection:"column", gap:24 }}>

          <div>
            <h1 style={{ fontSize:24, fontWeight:600, color:"#201547", margin:"0 0 4px" }}>{editProject ? "Editar Projeto" : "Cadastrar Novo Projeto"}</h1>
            <p style={{ fontSize:13, color:"#6b7280", margin:0 }}>Campos marcados com <span style={{ color:"#FA4616" }}>*</span> são obrigatórios.</p>
          </div>

          {/* Card 1: Informações do Projeto */}
          <div style={card}>
            <p style={section}>Informações do Projeto</p>

            <Field label="Nome do Projeto" required error={errors.title} icon={IFile}>
              <input value={form.title} onChange={e => change("title", e.target.value)}
                placeholder="Ex: Modernização do Sistema de Controle de Frota"
                style={inpStyle(!!errors.title)}
                onFocus={e => e.target.style.borderColor="#FA4616"}
                onBlur={e => e.target.style.borderColor=errors.title?"#f87171":"#d1d5db"} />
            </Field>

            <Field label="Descrição" required error={errors.description}>
              <textarea value={form.description} onChange={e => change("description", e.target.value)}
                placeholder="Descreva objetivo, escopo e principais entregas…" rows={4}
                style={{ ...inpStyle(!!errors.description), padding:"10px 12px", resize:"vertical" }}
                onFocus={e => e.target.style.borderColor="#FA4616"}
                onBlur={e => e.target.style.borderColor=errors.description?"#f87171":"#d1d5db"} />
            </Field>

            <div style={grid2}>
              <Field label="Cliente" required error={errors.company} icon={IBuild}>
                <select value={form.company} onChange={e => change("company", e.target.value)}
                  style={{ ...inpStyle(!!errors.company), appearance:"none" }}>
                  <option value="">Selecione o cliente…</option>
                  {CLIENTES.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </Field>
              <Field label="Link de Documentação" required error={errors.docLink} icon={ILink2}>
                <input type="url" value={form.docLink} onChange={e => change("docLink", e.target.value)}
                  placeholder="https://…" style={inpStyle(!!errors.docLink)}
                  onFocus={e => e.target.style.borderColor="#FA4616"}
                  onBlur={e => e.target.style.borderColor=errors.docLink?"#f87171":"#d1d5db"} />
              </Field>
            </div>

            <div style={grid3}>
              <Field label="Data de Início" required error={errors.startDate} icon={ICalendar}>
                <input type="date" value={form.startDate} onChange={e => change("startDate", e.target.value)}
                  style={inpStyle(!!errors.startDate)} />
              </Field>
              <Field label="Data de Término" required error={errors.endDate} icon={ICalendar}>
                <input type="date" value={form.endDate} min={form.startDate || undefined}
                  onChange={e => change("endDate", e.target.value)}
                  style={inpStyle(!!errors.endDate)} />
              </Field>
              <Field label="Período (meses)" icon={IClock}>
                <input readOnly value={months !== "" ? `${months} ${months === 1 ? "mês" : "meses"}` : ""}
                  placeholder="Calculado automaticamente"
                  style={{ ...inpStyle(false), padding:"10px 12px 10px 36px", background:"#f9fafb", color:"#9ca3af", cursor:"default" }} />
              </Field>
            </div>
          </div>

          {/* Card 2: Contato (opcional) */}
          <div style={card}>
            <p style={section}>Informações de Contato <span style={{ fontSize:12, fontWeight:400, color:"#9ca3af", marginLeft:6 }}>(opcionais)</span></p>
            <div style={grid2}>
              <Field label="Ponto Focal" icon={IUser}>
                <input value={form.focalPoint} onChange={e => change("focalPoint", e.target.value)}
                  placeholder="Nome do responsável" style={inpStyle(false)}
                  onFocus={e => e.target.style.borderColor="#FA4616"}
                  onBlur={e => e.target.style.borderColor="#d1d5db"} />
              </Field>
              <Field label="E-mail" error={errors.email} icon={IMail}>
                <input type="email" value={form.email} onChange={e => change("email", e.target.value)}
                  placeholder="responsavel@empresa.com.br" style={inpStyle(!!errors.email)}
                  onFocus={e => e.target.style.borderColor="#FA4616"}
                  onBlur={e => e.target.style.borderColor=errors.email?"#f87171":"#d1d5db"} />
              </Field>
            </div>
            <div style={grid2}>
              <Field label="Número do Contrato" icon={IFile}>
                <input value={form.contractNumber} onChange={e => change("contractNumber", e.target.value)}
                  placeholder="Ex: 5900.0131123.25.2" style={inpStyle(false)}
                  onFocus={e => e.target.style.borderColor="#FA4616"}
                  onBlur={e => e.target.style.borderColor="#d1d5db"} />
              </Field>
            </div>
          </div>

          {/* Ações */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", paddingTop:8 }}>
            <button onClick={onCancel}
              style={{ display:"flex", alignItems:"center", gap:6, padding:"10px 24px", borderRadius:8, border:"1px solid #d1d5db", background:"#fff", fontSize:13, fontWeight:500, color:"#4b5563", cursor:"pointer" }}
              onMouseEnter={e => { e.currentTarget.style.background="#f9fafb"; e.currentTarget.style.borderColor="#9ca3af"; }}
              onMouseLeave={e => { e.currentTarget.style.background="#fff"; e.currentTarget.style.borderColor="#d1d5db"; }}
            ><IXIcon /> Cancelar</button>
            <button onClick={submit} disabled={saving}
              style={{ display:"flex", alignItems:"center", gap:6, padding:"10px 32px", borderRadius:8, border:"none", background:saving?"#9ca3af":"#FA4616", fontSize:13, fontWeight:500, color:"#fff", cursor:saving?"not-allowed":"pointer", boxShadow:"0 2px 4px rgba(250,70,22,.3)" }}
              onMouseEnter={e => { if(!saving) e.currentTarget.style.background="#e03d12"; }}
              onMouseLeave={e => { if(!saving) e.currentTarget.style.background="#FA4616"; }}
            ><ISave /> {saving ? "Salvando…" : editProject ? "Salvar Alterações" : "Salvar Projeto"}</button>
          </div>

        </div>
      </main>
    </div>

      {/* ── Modal de confirmação de cadastro ─────────────────────────── */}
      {savedProject && (
        <div style={{
          position:"fixed", inset:0, background:"rgba(32,21,71,0.45)", zIndex:1000,
          display:"flex", alignItems:"center", justifyContent:"center", padding:24,
        }}>
          <div style={{
            background:"#fff", borderRadius:12, padding:"32px 32px 28px", maxWidth:420, width:"100%",
            boxShadow:"0 20px 60px rgba(32,21,71,0.2)",
          }}>
            <h2 style={{ fontSize:18, fontWeight:700, color:"#111827", margin:"0 0 8px" }}>
              {editProject ? "Projeto Atualizado" : "Projeto Criado"}
            </h2>
            <p style={{ fontSize:14, color:"#6b7280", margin:"0 0 28px", lineHeight:1.5 }}>
              O projeto <strong style={{ color:"#201547" }}>{savedProject.title}</strong> foi {editProject ? "atualizado" : "criado"} com sucesso.
            </p>
            <div style={{ display:"flex", gap:12, justifyContent:"flex-end" }}>
              <button
                onClick={() => onSave(savedProject)}
                style={{
                  padding:"10px 24px", borderRadius:8, border:"1px solid #d1d5db",
                  background:"#fff", fontSize:13, fontWeight:500, color:"#4b5563",
                  cursor:"pointer",
                }}
                onMouseEnter={e => e.currentTarget.style.background="#f9fafb"}
                onMouseLeave={e => e.currentTarget.style.background="#fff"}
              >Fechar</button>
              <button
                onClick={() => onOpen(savedProject)}
                style={{
                  padding:"10px 24px", borderRadius:8, border:"none",
                  background:"#FA4616", fontSize:13, fontWeight:500, color:"#fff",
                  cursor:"pointer", boxShadow:"0 2px 4px rgba(250,70,22,.3)",
                }}
                onMouseEnter={e => e.currentTarget.style.background="#e03d12"}
                onMouseLeave={e => e.currentTarget.style.background="#FA4616"}
              >Abrir</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
};

const KpiCard = ({ Icon, label, value, accentColor }) => (

            background:C.lime, borderRadius:24, padding:"3px 10px",

        </div>
        <p style={{ fontSize:12, color:C.gray500, margin:"4px 0 0" }}>{phase.duration}</p>

// ─── App (roteador simples: "home" | "new" | "detail") ──────────────────────
function App() {
  const [page,          setPage]         = useState("home");
  const [selectedId,    setSelectedId]   = useState(null);
  const [projects,      setProjects]     = useState(MOCK_PROJECTS);
  const [q,             setQ]            = useState("");
  const [filterStatus,  setFilterStatus] = useState("todos");
  const [filterCliente, setFilterCliente]= useState("todos");
  const [lastAction,    setLastAction]    = useState(null);
  // Modal de exclusão
  const [deleteTarget,  setDeleteTarget] = useState(null); // { id, title }
  const [editTarget,    setEditTarget]   = useState(null); // projeto em edição

  // ── Toast com auto-dismiss (3 s) ─────────────────────────────────────────
  const triggerToast = (msg) => {
    setLastAction(msg);
    setTimeout(() => setLastAction(null), 3000);
  };
  // Paginação
  const [currentPage,   setCurrentPage]  = useState(1);
  const [itemsPerPage,  setItemsPerPage] = useState(() => {
    try { return Number(localStorage.getItem("orq_ipp")) || 25; } catch { return 25; }
  });

  // ── Navegar para detalhes ────────────────────────────────────────────────
  const handleViewDetail = (id) => {
    setSelectedId(id);
    setPage("detail");
  };

  // ── Voltar para Visão Geral ──────────────────────────────────────────────
  const handleBack = () => {
    setPage("home");
    setSelectedId(null);
  };

  // Resetar para p.1 ao filtrar; persistir itemsPerPage
  useEffect(() => { setCurrentPage(1); }, [q, filterStatus, filterCliente]);
  useEffect(() => {
    setCurrentPage(1);
    try { localStorage.setItem("orq_ipp", String(itemsPerPage)); } catch {}
  }, [itemsPerPage]);

  // ── Salvar novo projeto e voltar ─────────────────────────────────────────
  const handleSaveProject = (project) => {
    if (editTarget) {
      setProjects(prev => prev.map(p => p.id === project.id ? project : p));
      triggerToast("Projeto atualizado.");
    } else {
      setProjects(prev => [...prev, project]);
    }
    setEditTarget(null);
    setPage("home");
  };

  // ── Salvar novo projeto e abrir detalhe ──────────────────────────────────
  const handleOpenProject = (project) => {
    if (editTarget) {
      setProjects(prev => prev.map(p => p.id === project.id ? project : p));
    } else {
      setProjects(prev => [...prev, project]);
    }
    setEditTarget(null);
    setSelectedId(project.id);
    setPage("detail");
  };

  // ── Página Cadastrar Projeto ─────────────────────────────────────────────
  if (page === "new") {
    return (
      <NewProjectPage
        editProject={editTarget}
        onSave={handleSaveProject}
        onOpen={handleOpenProject}
        onCancel={() => { setEditTarget(null); setPage("home"); }}
      />
    );
  }

  // ── Página de Detalhes ───────────────────────────────────────────────────
  if (page === "detail") {
    const selProj     = projects.find(p => p.id === selectedId) || projects[0];
    const contractObj = {
      id:         selProj.id,
      number:     selProj.number || selProj.contractNumber || "",
      title:      selProj.title,
      company:    selProj.company,
      status:     selProj.status   || "Planejado",
      progress:   selProj.progress ?? 0,
      contractor: selProj.contractor || "SPASSU TECNOLOGIA E SERVIÇOS S.A.",
      duration:   calcMonths(selProj.startDate, selProj.endDate)
                    ? `${calcMonths(selProj.startDate, selProj.endDate)} meses`
                    : "—",
      startDate:  selProj.startDate ? new Date(selProj.startDate) : null,
      endDate:    selProj.endDate   ? new Date(selProj.endDate)   : null,
      totalValue: selProj.totalValue || 0,
      lastUpdate: new Date(),
    };
    const detailObj = selProj.id === "1" ? MOCK_DETAIL : {
      milestones: [], phases: [], progress: [], financial: [], issues: [],
    };
    return (
      <ContractDetailPage
        contract={contractObj}
        detail={detailObj}
        onBack={handleBack}
      />
    );
  }

  // ── Visão Geral (página inicial) ─────────────────────────────────────────
  const clienteOptions = [
    { value:"todos", label:"Todos os clientes" },
    ...[...new Set(projects.map(c => c.company))].sort().map(c => ({ value:c, label:c })),
  ];
  const statusOptions = [
    { value:"todos",        label:"Todos os status"  },
    { value:"Em Andamento", label:"Em Andamento"     },
    { value:"Planejado",    label:"Planejado"        },
    { value:"Suspenso",     label:"Suspenso"         },
    { value:"Cancelado",    label:"Cancelado"        },
    { value:"Finalizado",   label:"Finalizado"       },
  ];
  const lq = q.toLowerCase().trim();
  const filtered = projects.filter(c => {
    const mStatus  = filterStatus  === "todos" || c.status  === filterStatus;
    const mCliente = filterCliente === "todos" || c.company === filterCliente;
    const mText    = !lq || c.title.toLowerCase().includes(lq) || c.company.toLowerCase().includes(lq) || c.number.toLowerCase().includes(lq);
    return mStatus && mCliente && mText;
  });
  const kpis       = kpiDefs(filtered);
  const isFiltered = q.trim() !== "" || filterStatus !== "todos" || filterCliente !== "todos";

  // Paginação derivada
  const totalPages = Math.max(1, Math.ceil(filtered.length / itemsPerPage));
  const paginated  = filtered.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

  // Gera array de páginas visíveis com ellipsis (max 5 + pontas)
  const getPageNums = (cur, total) => {
    if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
    const left  = Math.max(2, cur - 2);
    const right = Math.min(total - 1, cur + 2);
    const pages = [1];
    if (left > 2)          pages.push("…");
    for (let i = left; i <= right; i++) pages.push(i);
    if (right < total - 1) pages.push("…");
    pages.push(total);
    return pages;
  };
  const clearAll   = () => { setQ(""); setFilterStatus("todos"); setFilterCliente("todos"); };
  const iconBtn    = {
    background:"#f9fafb", border:"1px solid #e5e7eb", borderRadius:4,
    padding:6, cursor:"pointer", color:"#6b7280",
    display:"flex", alignItems:"center", justifyContent:"center",
  };

  return (
    <>
    <div style={{ minHeight:"100vh", background:"#f9fafb", fontFamily:"Poppins, system-ui, sans-serif" }}>

      {/* ── Header — logoDesliza (sem hamburger na Visão Geral) ──────── */}
      <AppHeader hasSidebar={false} />

      {/* ── Sub-header ─────────────────────────────────────────────────── */}
      <div style={{ background:"#fff", borderBottom:"1px solid #e5e7eb", height:56, display:"flex", alignItems:"center", padding:"0 32px", gap:16 }}>
        <h1 style={{ fontSize:24, fontWeight:500, color:"#111827", flex:1, margin:0 }}>Visão geral</h1>
        {lastAction && (
          <span style={{ fontSize:12, color:"#16a34a", background:"#f0fdf4", border:"1px solid #bbf7d0", padding:"4px 10px", borderRadius:6 }}>{lastAction}</span>
        )}
        <button
          style={{ background:"#FA4616", color:"#fff", border:"none", borderRadius:8, padding:"10px 16px",
                   fontSize:13, fontWeight:500, cursor:"pointer", display:"flex", alignItems:"center", gap:6 }}
          onMouseEnter={e => e.currentTarget.style.background="#e03d12"}
          onMouseLeave={e => e.currentTarget.style.background="#FA4616"}
          onClick={() => setPage("new")}
        >
          <IPlus /> Cadastrar Projeto
        </button>
      </div>

      {/* ── Conteúdo ───────────────────────────────────────────────────── */}
      <main style={{ padding:32, display:"flex", flexDirection:"column", gap:24 }}>

        {/* KPI Strip */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(160px, 1fr))", gap:24 }}>
          {kpis.map(({ Icon, label, value }) => (
            <div key={label} style={{ background:"#fff", borderRadius:8, boxShadow:"0 4px 6px -1px rgba(32,21,71,.1)",
                                      padding:24, display:"flex", alignItems:"center", justifyContent:"space-between", height:100 }}>
              <div style={{ display:"flex", flexDirection:"column", justifyContent:"space-between", height:"100%" }}>
                <span style={{ fontSize:13, fontWeight:500, color:"#201547" }}>{label}</span>
                <span style={{ fontSize:24, fontWeight:600, color:"#201547" }}>{value}</span>
              </div>
              <div style={{ width:48, height:48, borderRadius:9999, background:"rgba(250,70,22,0.08)",
                             display:"flex", alignItems:"center", justifyContent:"center", color:"#FA4616", flexShrink:0 }}>
                <Icon />
              </div>
            </div>
          ))}
        </div>

        {/* ── Barra de Busca + Filtros ───────────────────────────────── */}
        <div style={{ background:"#fff", borderRadius:8, boxShadow:"0 4px 6px -1px rgba(32,21,71,.1)", padding:"14px 20px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
            <div style={{ flex:1, minWidth:0, display:"flex", alignItems:"center", gap:8, background:"#f9fafb",
                           border:"1px solid #e5e7eb", borderRadius:8, padding:"8px 12px" }}
              onFocusCapture={e => e.currentTarget.style.borderColor="#FA4616"}
              onBlurCapture={e => e.currentTarget.style.borderColor="#e5e7eb"}

              />

                <button onClick={() => setQ("")} style={{ background:"none", border:"none", cursor:"pointer",
                          color:"#9ca3af", display:"flex", padding:0, flexShrink:0 }}
                  onMouseEnter={e => e.currentTarget.style.color="#374151"}

                background: isFiltered ? "#fef2f2" : "#f9fafb",

            ><IXSmall /> Limpar filtros</button>
          </div>
        </div>

        {/* ── Tabela de Projetos ─────────────────────────────────────── */}

          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
            <h2 style={{ fontSize:22, fontWeight:600, color:"#201547", margin:0 }}>Projetos Cadastrados</h2>
            <span style={{ fontSize:13, fontWeight:500, color: isFiltered ? "#FA4616" : "#9ca3af" }}>
              {filtered.length} projeto{filtered.length !== 1 ? "s" : ""} encontrado{filtered.length !== 1 ? "s" : ""}
            </span>
          </div>
          <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <thead>
              <tr style={{ background:"rgba(217,217,214,0.35)" }}>
                {["Título","Cliente","Status","Progresso","Ações"].map((h, i, arr) => (
                  <th key={h} style={{
                    padding:"14px 16px", fontSize:13, fontWeight:500, color:"#201547",
                    textAlign: h==="Ações" ? "right" : "left",
                    borderRadius: i===0 ? "8px 0 0 8px" : i===arr.length-1 ? "0 8px 8px 0" : 0,
                  }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0 ? (
                <tr>
                  <td colSpan={5} style={{ padding:"48px 16px", textAlign:"center", color:"#9ca3af" }}>
                    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
                      <span style={{ color:"#d1d5db" }}><IFolder /></span>
                      <span style={{ fontSize:14, fontWeight:500 }}>
                        {isFiltered ? "Nenhum projeto corresponde aos filtros." : "Nenhum projeto encontrado."}
                      </span>
                    </div>
                  </td>
                </tr>
              ) : paginated.map((c, idx) => {
                const s = STATUS_MAP[c.status] ?? STATUS_MAP["Planejado"];
                return (
                  <tr key={c.id} style={{ borderTop: idx > 0 ? "1px solid #f3f4f6" : "none" }}
                    onMouseEnter={e => e.currentTarget.style.background="#fafafa"}
                    onMouseLeave={e => e.currentTarget.style.background="transparent"}
                  >
                    {/* Título — clicável para Ver detalhes */}
                    <td style={{ padding:16, verticalAlign:"middle" }}>
                      <button
                        onClick={() => handleViewDetail(c.id)}
                        title="Ver detalhes do projeto"
                        style={{ background:"none", border:"none", cursor:"pointer", padding:0, textAlign:"left" }}
                        onMouseEnter={e => {
                          e.currentTarget.querySelector(".ttl").style.color="#FA4616";
                          e.currentTarget.querySelector(".ttl").style.textDecoration="underline";
                        }}
                        onMouseLeave={e => {
                          e.currentTarget.querySelector(".ttl").style.color="#201547";
                          e.currentTarget.querySelector(".ttl").style.textDecoration="none";
                        }}
                      >
                        <span className="ttl" style={{ fontSize:13, fontWeight:500, color:"#201547", display:"block", transition:"color 0.15s" }}>
                          <Highlight text={c.title} query={q} />
                        </span>
                        <span style={{ fontSize:11, color:"#9ca3af", display:"block", marginTop:2 }}>
                          <Highlight text={c.number} query={q} />
                        </span>
                      </button>
                    </td>
                    {/* Cliente */}
                    <td style={{ padding:16, fontSize:13, color:"#201547" }}>
                      <Highlight text={c.company} query={q} />
                    </td>
                    {/* Status */}
                    <td style={{ padding:16 }}>
                      <span style={{ display:"inline-flex", alignItems:"center", gap:6, background:s.bg,
                                     color:s.color, fontSize:12, fontWeight:500, padding:"4px 10px", borderRadius:6 }}>
                        <span style={{ width:6, height:6, borderRadius:"50%", background:s.dot, flexShrink:0 }} />
                        {c.status}
                      </span>
                    </td>
                    {/* Progresso */}
                    <td style={{ padding:16 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, width:120 }}>
                        <div style={{ flex:1, background:"#e5e7eb", borderRadius:9999, height:6, overflow:"hidden" }}>
                          <div style={{ height:"100%", width:`${Math.min(c.progress ?? 0, 100)}%`,
                                        background:"#FA4616", borderRadius:9999 }} />
                        </div>
                        <span style={{ fontSize:12, fontWeight:500, color:"#FA4616", width:28,
                                       textAlign:"right", flexShrink:0 }}>{c.progress ?? 0}%</span>
                      </div>
                    </td>
                    {/* Ações */}
                    <td style={{ padding:16 }}>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:4 }}>
                        <button style={iconBtn} title="Ver detalhes" onClick={() => handleViewDetail(c.id)}
                          onMouseEnter={e => { e.currentTarget.style.background="#eff6ff"; e.currentTarget.style.borderColor="#bfdbfe"; e.currentTarget.style.color="#1d4ed8"; }}
                          onMouseLeave={e => { e.currentTarget.style.background="#f9fafb"; e.currentTarget.style.borderColor="#e5e7eb"; e.currentTarget.style.color="#6b7280"; }}
                        ><ILink /></button>
                        <button style={iconBtn} title="Editar" onClick={() => { setEditTarget(c); setPage("new"); }}
                          onMouseEnter={e => e.currentTarget.style.background="#f3f4f6"}
                          onMouseLeave={e => e.currentTarget.style.background="#f9fafb"}
                        ><IPencil /></button>
                        <button style={iconBtn} title="Excluir"
                          onClick={() => setDeleteTarget({ id: c.id, title: c.title })}
                          onMouseEnter={e => { e.currentTarget.style.background="#fef2f2"; e.currentTarget.style.borderColor="#fecaca"; e.currentTarget.style.color="#b91c1c"; }}
                          onMouseLeave={e => { e.currentTarget.style.background="#f9fafb"; e.currentTarget.style.borderColor="#e5e7eb"; e.currentTarget.style.color="#6b7280"; }}
                        ><ITrash /></button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          </div>

          {/* ── Footer de paginação ─────────────────────────────────────── */}
          {totalPages > 1 && (
            <div style={{
              borderTop:"1px solid #f3f4f6", padding:"16px 24px",
              display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12,
            }}>
              {/* Contador descritivo */}
              <span style={{ fontSize:13, color:"#6b7280", flexShrink:0 }}>
                Exibindo {Math.min((currentPage-1)*itemsPerPage+1, filtered.length)}–{Math.min(currentPage*itemsPerPage, filtered.length)} de {filtered.length} projeto{filtered.length!==1?"s":""}
              </span>

              {/* Navegação central */}
              <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                {/* Anterior */}
                <button
                  onClick={() => setCurrentPage(p => Math.max(1, p-1))}
                  disabled={currentPage === 1}
                  style={{ padding:"6px 10px", borderRadius:6, border:"1px solid #e5e7eb",
                           background:"#fff", color: currentPage===1 ? "#d1d5db" : "#374151",
                           cursor: currentPage===1 ? "default" : "pointer", fontSize:13, lineHeight:1 }}
                >←</button>

                {/* Números */}
                {getPageNums(currentPage, totalPages).map((p, i) =>
                  p === "…" ? (
                    <span key={"e"+i} style={{ padding:"6px 4px", fontSize:13, color:"#9ca3af" }}>…</span>
                  ) : (
                    <button key={p}
                      onClick={() => setCurrentPage(p)}
                      style={{
                        padding:"6px 10px", borderRadius:6, border:"1px solid",
                        borderColor: p===currentPage ? "#FA4616" : "#e5e7eb",
                        background: p===currentPage ? "#FA4616" : "#fff",
                        color:       p===currentPage ? "#fff"    : "#374151",
                        cursor:"pointer", fontSize:13, fontWeight: p===currentPage ? 600 : 400,
                        minWidth:32,
                      }}
                    >{p}</button>
                  )
                )}

                {/* Próximo */}
                <button
                  onClick={() => setCurrentPage(p => Math.min(totalPages, p+1))}
                  disabled={currentPage === totalPages}
                  style={{ padding:"6px 10px", borderRadius:6, border:"1px solid #e5e7eb",
                           background:"#fff", color: currentPage===totalPages ? "#d1d5db" : "#374151",
                           cursor: currentPage===totalPages ? "default" : "pointer", fontSize:13, lineHeight:1 }}
                >→</button>
              </div>

              {/* Pills de densidade */}
              <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
                {[10, 25, 50].map(n => (
                  <button key={n}
                    onClick={() => setItemsPerPage(n)}
                    style={{
                      padding:"5px 12px", borderRadius:24, border:"1px solid",
                      borderColor: n===itemsPerPage ? "#FA4616" : "#e5e7eb",
                      background:  n===itemsPerPage ? "#FA4616" : "#fff",
                      color:       n===itemsPerPage ? "#fff"    : "#6b7280",
                      cursor:"pointer", fontSize:12, fontWeight: n===itemsPerPage ? 600 : 400,
                    }}
                  >{n}</button>
                ))}
              </div>
            </div>
          )}
        </div>
      </main>
    </div>
      {/* ── Modal de confirmação de exclusão ────────────────────────────── */}
      {deleteTarget && (
        <div style={{
          position:"fixed", inset:0, background:"rgba(32,21,71,0.45)", zIndex:1000,
          display:"flex", alignItems:"center", justifyContent:"center", padding:24,
        }}>
          <div style={{
            background:"#fff", borderRadius:12, padding:"32px 32px 28px", maxWidth:420, width:"100%",
            boxShadow:"0 20px 60px rgba(32,21,71,0.2)",
          }}>
            {/* Ícone de alerta */}
            <div style={{ width:44, height:44, borderRadius:8, background:"#fef2f2",
                          display:"flex", alignItems:"center", justifyContent:"center",
                          color:"#b91c1c", marginBottom:16 }}>
              <ITrash />
            </div>
            <h2 style={{ fontSize:17, fontWeight:700, color:"#111827", margin:"0 0 8px" }}>
              Excluir projeto
            </h2>
            <p style={{ fontSize:14, color:"#6b7280", margin:"0 0 24px", lineHeight:1.6 }}>
              Tem certeza que deseja excluir{" "}
              <strong style={{ color:"#201547" }}>{deleteTarget.title}</strong>?
              Esta ação não pode ser desfeita.
            </p>
            <div style={{ display:"flex", gap:12, justifyContent:"flex-end" }}>
              <button
                onClick={() => setDeleteTarget(null)}
                style={{ padding:"10px 24px", borderRadius:8, border:"1px solid #d1d5db",
                         background:"#fff", fontSize:13, fontWeight:500, color:"#4b5563", cursor:"pointer" }}
                onMouseEnter={e => e.currentTarget.style.background="#f9fafb"}
                onMouseLeave={e => e.currentTarget.style.background="#fff"}
              >Cancelar</button>
              <button
                onClick={() => {
                  setProjects(prev => prev.filter(p => p.id !== deleteTarget.id));
                  triggerToast("Projeto excluído.");
                  setDeleteTarget(null);
                  setCurrentPage(1);
                }}
                style={{ padding:"10px 24px", borderRadius:8, border:"none",
                         background:"#b91c1c", fontSize:13, fontWeight:500, color:"#fff",
                         cursor:"pointer", boxShadow:"0 2px 4px rgba(32,21,71,0.15)" }}
                onMouseEnter={e => e.currentTarget.style.background="#991b1b"}
                onMouseLeave={e => e.currentTarget.style.background="#b91c1c"}
              >Excluir</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
